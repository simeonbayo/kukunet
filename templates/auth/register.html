{% extends 'base.html' %}

{% block title %}Register - KUKUNET{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-primary to-primary-dark">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">
                <i class="fas fa-user-plus text-primary mr-2"></i>Create Account
            </h2>
            
            <form id="registerForm">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-user text-primary mr-2"></i>Full Name
                    </label>
                    <input type="text" id="fullName" class="form-input" placeholder="John Doe" required>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-phone-alt text-primary mr-2"></i>Phone Number
                    </label>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="256712345678" required>
                    <p class="text-xs text-gray-500 mt-1">Use format: 256712345678 (Uganda)</p>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-lock text-primary mr-2"></i>4-Digit PIN
                    </label>
                    <input type="password" id="pin" class="form-input text-center text-2xl tracking-widest" maxlength="4" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-check-circle text-primary mr-2"></i>Confirm PIN
                    </label>
                    <input type="password" id="confirmPin" class="form-input text-center text-2xl tracking-widest" maxlength="4" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-user-tag text-primary mr-2"></i>Account Type
                    </label>
                    <select id="role" class="form-input" required>
                        <option value="">Select Account Type</option>
                        <option value="FARMER">🐔 Farmer</option>
                        <option value="CUSTOMER">🛒 Customer</option>
                        <option value="SUPPLIER">📦 Supplier</option>
                        <option value="TRAINER">📚 Trainer</option>
                        <option value="FIELD_OFFICER">🏥 Field Officer (Vet/Extension Worker)</option>
                        <option value="ORGANIZATION">🏢 Organization</option>
                    </select>
                </div>
                
                <!-- Field Officer Specific Fields -->
                <div id="officerFields" class="hidden space-y-4">
                    <div class="border-t pt-4">
                        <h3 class="font-semibold text-gray-700 mb-3">
                            <i class="fas fa-stethoscope text-teal-600 mr-2"></i>Professional Information
                        </h3>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Specialization</label>
                            <input type="text" id="specialization" class="form-input" placeholder="e.g., Poultry Veterinarian">
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">License Number</label>
                            <input type="text" id="licenseNumber" class="form-input" placeholder="Professional license number">
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Years of Experience</label>
                            <input type="number" id="yearsExperience" class="form-input" placeholder="0" value="0">
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Assigned Districts</label>
                            <input type="text" id="assignedDistricts" class="form-input" placeholder="e.g., Kampala, Wakiso, Mukono">
                        </div>
                    </div>
                </div>
                
                <!-- Organization Specific Fields -->
                <div id="orgFields" class="hidden space-y-4">
                    <div class="border-t pt-4">
                        <h3 class="font-semibold text-gray-700 mb-3">
                            <i class="fas fa-building text-indigo-600 mr-2"></i>Organization Information
                        </h3>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Organization Type</label>
                            <select id="orgType" class="form-input">
                                <option value="">Select Type</option>
                                <option value="COOPERATIVE">Cooperative</option>
                                <option value="AGRIBUSINESS">Agribusiness</option>
                                <option value="NGO">Non-Profit Organization</option>
                                <option value="GOVERNMENT">Government Agency</option>
                                <option value="RESEARCH">Research Institution</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Registration Number</label>
                            <input type="text" id="registrationNumber" class="form-input" placeholder="Organization registration number">
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Tax ID (TIN)</label>
                            <input type="text" id="taxId" class="form-input" placeholder="Tax Identification Number">
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm text-gray-600 mb-1">Website</label>
                            <input type="url" id="website" class="form-input" placeholder="https://example.com">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary w-full mt-4">
                    <i class="fas fa-user-plus mr-2"></i>Register
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">Already have an account? 
                    <a href="{% url 'frontend:login' %}" class="text-primary font-semibold hover:underline">
                        <i class="fas fa-sign-in-alt mr-1"></i>Sign In
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleRoleFields() {
    const role = document.getElementById('role').value;
    const officerFields = document.getElementById('officerFields');
    const orgFields = document.getElementById('orgFields');
    
    officerFields.classList.add('hidden');
    orgFields.classList.add('hidden');
    
    if (role === 'FIELD_OFFICER') {
        officerFields.classList.remove('hidden');
    } else if (role === 'ORGANIZATION') {
        orgFields.classList.remove('hidden');
    }
}

document.getElementById('role').addEventListener('change', toggleRoleFields);

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const pin = document.getElementById('pin').value;
    const confirmPin = document.getElementById('confirmPin').value;
    
    if (pin !== confirmPin) {
        showToast('PINs do not match!', 'error');
        return;
    }
    
    if (pin.length !== 4) {
        showToast('PIN must be 4 digits', 'error');
        return;
    }
    
    if (!/^\d+$/.test(pin)) {
        showToast('PIN must contain only numbers', 'error');
        return;
    }
    
    showLoading();
    
    const role = document.getElementById('role').value;
    if (!role) {
        hideLoading();
        showToast('Please select an account type', 'error');
        return;
    }
    
    const phoneNumber = document.getElementById('phoneNumber').value.replace(/[^0-9]/g, '');
    const fullName = document.getElementById('fullName').value.trim();
    
    if (!fullName) {
        hideLoading();
        showToast('Please enter your full name', 'error');
        return;
    }
    
    if (phoneNumber.length < 10) {
        hideLoading();
        showToast('Please enter a valid phone number', 'error');
        return;
    }
    
    // Build request data
    const requestData = {
        phone_number: phoneNumber,
        full_name: fullName,
        pin: pin,
        confirm_pin: confirmPin,
        role: role
    };
    
    // Add Field Officer specific data
    if (role === 'FIELD_OFFICER') {
        requestData.specialization = document.getElementById('specialization').value || '';
        requestData.license_number = document.getElementById('licenseNumber').value || '';
        requestData.years_experience = parseInt(document.getElementById('yearsExperience').value) || 0;
        requestData.assigned_districts = document.getElementById('assignedDistricts').value || '';
    }
    
    // Add Organization specific data
    if (role === 'ORGANIZATION') {
        requestData.organization_type = document.getElementById('orgType').value || '';
        requestData.registration_number = document.getElementById('registrationNumber').value || '';
        requestData.tax_id = document.getElementById('taxId').value || '';
        requestData.website = document.getElementById('website').value || '';
    }
    
    console.log('Sending registration data:', requestData);
    
    fetch('/api/v1/auth/register/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(requestData)
    })
    .then(response => response.json())
    .then(data => {
        hideLoading();
        console.log('Response:', data);
        
        if (data.success) {
            showToast('Registration successful! Please login.');
            setTimeout(() => {
                window.location.href = "{% url 'frontend:login' %}";
            }, 1500);
        } else {
            let errorMessage = data.message || 'Registration failed';
            if (data.errors) {
                const errors = Object.values(data.errors).flat();
                errorMessage = errors.join(', ');
            }
            showToast(errorMessage, 'error');
        }
    })
    .catch(error => {
        hideLoading();
        console.error('Error:', error);
        showToast('Network error. Please try again.', 'error');
    });
});

// PIN input formatting
document.getElementById('pin').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
});

document.getElementById('confirmPin').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
});

document.getElementById('phoneNumber').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 15);
});
</script>
{% endblock %}
