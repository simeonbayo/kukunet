{% extends 'base.html' %}

{% block title %}NGO Dashboard - KUKUNET{% endblock %}

{% block content %}
<div class="p-4">
    <!-- Welcome Section -->
    <div class="bg-gradient-to-r from-purple-700 to-purple-600 text-white rounded-2xl p-5 mb-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold">
                    <i class="fas fa-heart mr-2"></i>{{ user.organization_name }}
                </h1>
                <p class="opacity-90 mt-1">Non-Profit Dashboard</p>
            </div>
            <div class="bg-white/20 rounded-full p-3">
                <i class="fas fa-hand-holding-heart text-3xl"></i>
            </div>
        </div>
    </div>

    <!-- Impact Stats -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card text-center">
            <i class="fas fa-chalkboard-user text-3xl text-purple-600"></i>
            <p class="text-2xl font-bold mt-2" id="trainings">0</p>
            <p class="text-gray-500 text-sm">Trainings Held</p>
        </div>
        <div class="card text-center">
            <i class="fas fa-users text-3xl text-purple-600"></i>
            <p class="text-2xl font-bold mt-2" id="farmersTrained">0</p>
            <p class="text-gray-500 text-sm">Farmers Trained</p>
        </div>
        <div class="card text-center">
            <i class="fas fa-hand-holding-usd text-3xl text-purple-600"></i>
            <p class="text-2xl font-bold mt-2">UGX <span id="funding">0</span></p>
            <p class="text-gray-500 text-sm">Funding Received</p>
        </div>
        <div class="card text-center">
            <i class="fas fa-chart-line text-3xl text-purple-600"></i>
            <p class="text-2xl font-bold mt-2" id="impactScore">0</p>
            <p class="text-gray-500 text-sm">Impact Score</p>
        </div>
    </div>

    <!-- NGO Actions -->
    <div class="grid grid-cols-3 gap-3 mb-6">
        <button onclick="openTraining()" class="bg-white p-3 rounded-xl text-center shadow-sm">
            <i class="fas fa-chalkboard text-purple-600 text-xl"></i>
            <p class="text-xs mt-1">Schedule Training</p>
        </button>
        <button onclick="openOutreach()" class="bg-white p-3 rounded-xl text-center shadow-sm">
            <i class="fas fa-bullhorn text-purple-600 text-xl"></i>
            <p class="text-xs mt-1">Outreach Program</p>
        </button>
        <button onclick="openReport()" class="bg-white p-3 rounded-xl text-center shadow-sm">
            <i class="fas fa-file-alt text-purple-600 text-xl"></i>
            <p class="text-xs mt-1">Impact Report</p>
        </button>
    </div>

    <!-- Upcoming Trainings -->
    <div class="mb-6">
        <h2 class="text-lg font-bold mb-3">Upcoming Trainings</h2>
        <div id="trainingsList" class="space-y-2"></div>
    </div>

    <!-- Success Stories -->
    <div>
        <h2 class="text-lg font-bold mb-3">Success Stories</h2>
        <div id="storiesList" class="space-y-2"></div>
    </div>
</div>
{% endblock %}
