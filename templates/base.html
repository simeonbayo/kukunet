<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#2E7D32">
    <title>{% block title %}KUKUNET - Poultry Platform{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/images/logo/logo-icon.svg">
    <link rel="apple-touch-icon" href="/static/images/logo/logo-icon.svg">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/icons.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E7D32',
                        'primary-dark': '#1B5E20',
                        'primary-light': '#4CAF50',
                        secondary: '#FF8F00',
                        'secondary-dark': '#E65100',
                        accent: '#FFB74D',
                        success: '#4CAF50',
                        warning: '#FFC107',
                        danger: '#F44336',
                        info: '#2196F3',
                        background: '#F5F5F5',
                    },
                }
            }
        }
    </script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #F5F5F5;
        }
        
        .mobile-container {
            max-width: 430px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* Header with logo */
        .app-header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        
        /* Logo styles */
        .logo {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        
        .logo img {
            display: block;
            height: 36px;
            width: auto;
            transition: opacity 0.3s ease;
        }
        
        .logo:hover img {
            opacity: 0.9;
        }
        
        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 430px;
            width: 100%;
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 8px 0 12px;
            z-index: 50;
        }
        
        .bottom-nav-item {
            flex: 1;
            text-align: center;
            color: #9ca3af;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .bottom-nav-item.active {
            color: #2E7D32;
        }
        
        .bottom-nav-item i {
            font-size: 1.5rem;
        }
        
        .bottom-nav-item span {
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .btn-primary {
            background: #2E7D32;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #1B5E20;
            transform: translateY(-2px);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
            max-width: 90%;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2E7D32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-background">
    <div class="mobile-container">
        <!-- Header with Logo - White background version -->
        <header class="app-header">
            <div class="flex items-center justify-between">
                <a href="/" class="logo">
                    <img src="/static/images/logo/logo-full.svg" alt="KUKUNET">
                </a>
                
                {% if user.is_authenticated %}
                <div class="flex items-center gap-3">
                    <button class="relative">
                        <i class="fas fa-bell text-gray-500 text-xl"></i>
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
                    </button>
                </div>
                {% endif %}
            </div>
        </header>
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-2xl p-6 flex flex-col items-center">
                <div class="spinner"></div>
                <p class="mt-4 text-gray-600">Loading...</p>
            </div>
        </div>
        
        <!-- Main Content -->
        <main id="mainContent" class="pb-20 min-h-screen">
            {% block content %}{% endblock %}
        </main>
        
      <!-- templates/base.html - Update the bottom navigation section -->

<!-- Bottom Navigation -->
{% if user.is_authenticated %}
<nav class="bottom-nav flex">
    <a href="{% url 'frontend:dashboard' %}" class="bottom-nav-item {% if active_nav == 'home' %}active{% endif %}">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </a>
    <a href="{% url 'frontend:farm_management' %}" class="bottom-nav-item {% if active_nav == 'farm' %}active{% endif %}">
        <i class="fas fa-tractor"></i>
        <span>Farm</span>
    </a>
    <a href="{% url 'frontend:shop' %}" class="bottom-nav-item {% if active_nav == 'shop' %}active{% endif %}">
        <i class="fas fa-store"></i>
        <span>Shop</span>
    </a>
    <a href="{% url 'frontend:courses' %}" class="bottom-nav-item {% if active_nav == 'learn' %}active{% endif %}">
        <i class="fas fa-graduation-cap"></i>
        <span>Learn</span>
    </a>
    <a href="{% url 'frontend:profile' %}" class="bottom-nav-item {% if active_nav == 'profile' %}active{% endif %}">
        <i class="fas fa-user"></i>
        <span>Profile</span>
    </a>
</nav>
{% endif %}
    </div>
    
    <!-- Toast Container -->
    <div id="toastContainer"></div>
    
    <script>
        function showToast(message, type = 'success') {
            const icon = type === 'success' ? 'fa-check-circle' : 
                        (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            
            const toast = $(`
                <div class="toast">
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                </div>
            `);
            
            $('#toastContainer').append(toast);
            setTimeout(() => {
                toast.fadeOut(300, () => toast.remove());
            }, 3000);
        }
        
        function showLoading() {
            $('#loadingOverlay').removeClass('hidden');
        }
        
        function hideLoading() {
            $('#loadingOverlay').addClass('hidden');
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        window.showToast = showToast;
        window.showLoading = showLoading;
        window.hideLoading = hideLoading;
        window.getCookie = getCookie;
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
