{% extends 'base.html' %}
{% load static %}

{% block title %}Daily Records - KUKUNET{% endblock %}

{% block content %}
<div class="p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <button onclick="history.back()" class="text-primary mr-2">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-2xl font-bold text-gray-800 inline-block">
                <i class="fas fa-clipboard-list text-primary mr-2"></i>Daily Records
            </h1>
            <p class="text-sm text-gray-500 mt-1" id="flockName">Loading flock...</p>
        </div>
        <button onclick="openAddRecordModal()" class="bg-primary text-white px-4 py-2 rounded-xl text-sm">
            <i class="fas fa-plus mr-1"></i>Add Record
        </button>
    </div>

    <!-- Records List -->
    <div id="recordsList" class="space-y-3">
        <div class="text-center py-8">
            <div class="spinner mx-auto"></div>
            <p class="text-gray-500 mt-2">Loading records...</p>
        </div>
    </div>
</div>

<!-- Add Record Modal -->
<div id="addRecordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full max-h-screen overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">
                    <i class="fas fa-clipboard-list text-primary mr-2"></i>Add Daily Record
                </h2>
                <button onclick="closeModal('addRecordModal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="addRecordForm">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Date</label>
                    <input type="date" id="recordDate" class="form-input" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Opening Bird Count</label>
                    <input type="number" id="openingCount" class="form-input" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Mortality</label>
                    <input type="number" id="mortality" class="form-input" value="0">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Feed Given (kg)</label>
                    <input type="number" step="0.1" id="feedGiven" class="form-input" value="0">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Water Consumed (L)</label>
                    <input type="number" step="0.1" id="waterConsumed" class="form-input" value="0">
                </div>
                <div class="mb-4" id="eggsField">
                    <label class="block text-sm font-bold mb-2">Eggs Collected</label>
                    <input type="number" id="eggsCollected" class="form-input" value="0">
                </div>
                <div class="mb-4" id="weightField">
                    <label class="block text-sm font-bold mb-2">Average Weight (kg)</label>
                    <input type="number" step="0.01" id="avgWeight" class="form-input" placeholder="e.g., 1.8">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Observations</label>
                    <textarea id="observations" rows="2" class="form-input" placeholder="Any issues or notes..."></textarea>
                </div>
                <button type="submit" class="btn-primary w-full">
                    <i class="fas fa-save mr-2"></i>Save Record
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const flockId = {{ flock_id }};
let birdType = '';

function getCSRFToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 10) === ('csrftoken' + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(10));
                break;
            }
        }
    }
    return cookieValue;
}

function loadFlockInfo() {
    fetch(`/api/v1/farms/flocks/${flockId}/`, {
        method: 'GET',
        credentials: 'include',
        headers: {
            'X-CSRFToken': getCSRFToken(),
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(flock => {
        $('#flockName').text(`${flock.batch_name} - ${flock.bird_type}`);
        birdType = flock.bird_type;
        
        if (birdType === 'LAYERS' || birdType === 'KUROILER') {
            $('#eggsField').show();
        } else {
            $('#eggsField').hide();
        }
        if (birdType === 'BROILERS' || birdType === 'KUROILER') {
            $('#weightField').show();
        } else {
            $('#weightField').hide();
        }
        
        $('#openingCount').val(flock.current_quantity);
    })
    .catch(error => console.error('Error loading flock:', error));
}

function loadRecords() {
    fetch(`/api/v1/farms/daily-records/?batch=${flockId}`, {
        method: 'GET',
        credentials: 'include',
        headers: {
            'X-CSRFToken': getCSRFToken(),
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(records => {
        if (!records || records.length === 0) {
            $('#recordsList').html(`
                <div class="card text-center py-8">
                    <i class="fas fa-clipboard-list text-4xl text-gray-300 mb-2"></i>
                    <p class="text-gray-500">No daily records yet</p>
                    <button onclick="openAddRecordModal()" class="btn-primary mt-3 text-sm py-2 px-4">
                        <i class="fas fa-plus mr-1"></i>Add First Record
                    </button>
                </div>
            `);
            return;
        }
        
        let html = '';
        records.forEach(record => {
            html += `
                <div class="card">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-lg">${record.date}</p>
                            <div class="grid grid-cols-2 gap-2 mt-2 text-sm">
                                <div><span class="text-gray-500">Mortality:</span> ${record.mortality}</div>
                                <div><span class="text-gray-500">Feed:</span> ${record.feed_consumed_kg} kg</div>
                                <div><span class="text-gray-500">Water:</span> ${record.water_consumed_liters} L</div>
                                ${record.eggs_collected ? `<div><span class="text-gray-500">Eggs:</span> ${record.eggs_collected}</div>` : ''}
                                ${record.avg_weight_kg ? `<div><span class="text-gray-500">Avg Weight:</span> ${record.avg_weight_kg} kg</div>` : ''}
                            </div>
                            ${record.farmer_observations ? `<p class="text-sm text-gray-500 mt-2">${record.farmer_observations}</p>` : ''}
                        </div>
                        <button onclick="deleteRecord(${record.id})" class="text-red-600">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        $('#recordsList').html(html);
    })
    .catch(error => {
        console.error('Error loading records:', error);
        $('#recordsList').html(`
            <div class="card text-center py-8">
                <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-2"></i>
                <p class="text-gray-500">Error loading records</p>
                <button onclick="loadRecords()" class="btn-primary mt-3 text-sm py-2 px-4">
                    <i class="fas fa-sync-alt mr-1"></i>Retry
                </button>
            </div>
        `);
    });
}

$('#addRecordForm').on('submit', function(e) {
    e.preventDefault();
    showLoading();
    
    const formData = {
        batch: flockId,
        date: $('#recordDate').val(),
        opening_bird_count: parseInt($('#openingCount').val()),
        mortality: parseInt($('#mortality').val()) || 0,
        feed_given_kg: parseFloat($('#feedGiven').val()) || 0,
        water_consumed_liters: parseFloat($('#waterConsumed').val()) || 0,
        farmer_observations: $('#observations').val()
    };
    
    if (birdType === 'LAYERS' || birdType === 'KUROILER') {
        formData.eggs_collected = parseInt($('#eggsCollected').val()) || 0;
    }
    if (birdType === 'BROILERS' || birdType === 'KUROILER') {
        formData.avg_weight_kg = parseFloat($('#avgWeight').val()) || null;
    }
    
    fetch(`/api/v1/farms/flocks/${flockId}/add-daily-record/`, {
        method: 'POST',
        credentials: 'include',
        headers: {
            'X-CSRFToken': getCSRFToken(),
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(formData)
    })
    .then(async response => {
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.message || data.error || `HTTP ${response.status}`);
        }
        return data;
    })
    .then(data => {
        hideLoading();
        if (data.id) {
            showToast('Daily record saved successfully!');
            closeModal('addRecordModal');
            $('#addRecordForm')[0].reset();
            loadRecords();
            loadFlockInfo();
        }
    })
    .catch(error => {
        hideLoading();
        console.error('Error:', error);
        showToast(error.message || 'Error saving record', 'error');
    });
});

function deleteRecord(recordId) {
    if (confirm('Are you sure you want to delete this record?')) {
        fetch(`/api/v1/farms/daily-records/${recordId}/`, {
            method: 'DELETE',
            credentials: 'include',
            headers: {
                'X-CSRFToken': getCSRFToken(),
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (response.status === 204 || response.ok) {
                showToast('Record deleted successfully');
                loadRecords();
                loadFlockInfo();
            } else {
                showToast('Error deleting record', 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showToast('Network error', 'error');
        });
    }
}

function openAddRecordModal() {
    const today = new Date().toISOString().split('T')[0];
    $('#recordDate').val(today);
    $('#addRecordModal').removeClass('hidden');
}

function closeModal(modalId) {
    $(`#${modalId}`).addClass('hidden');
}

function showLoading() {
    if ($('#loadingOverlay').length) {
        $('#loadingOverlay').removeClass('hidden');
    }
}

function hideLoading() {
    if ($('#loadingOverlay').length) {
        $('#loadingOverlay').addClass('hidden');
    }
}

function showToast(message, type = 'success') {
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
    const toast = $(`
        <div class="fixed bottom-20 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-4 py-2 rounded-lg shadow-lg z-50 animate-fade-in">
            <i class="fas ${icon} mr-2"></i>
            ${message}
        </div>
    `);
    $('body').append(toast);
    setTimeout(() => {
        toast.fadeOut(300, () => toast.remove());
    }, 3000);
}

$(document).ready(function() {
    loadFlockInfo();
    loadRecords();
});
</script>

<style>
.animate-fade-in {
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translate(-50%, 10px);
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}

.spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #2E7D32;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
{% endblock %}
