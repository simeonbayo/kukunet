<!-- Additional CSS for submenu items -->
<style>
    .nav-submenu {
        margin-left: 2.5rem;
    }
    
    .nav-subitem {
        display: block;
        padding: 0.5rem 1rem;
        font-size: 0.8125rem;
        color: #cbd5e1;
        transition: all 0.2s ease;
        border-radius: 0.375rem;
        text-decoration: none;
    }
    
    .nav-subitem:hover {
        color: white;
        background: rgba(255, 255, 255, 0.05);
        transform: translateX(4px);
    }
    
    .nav-subitem i {
        width: 1.25rem;
        font-size: 0.75rem;
    }
    
    .nav-subitem.active {
        background: rgba(37, 99, 235, 0.2);
        color: white;
    }
</style>

<script>
    // Show toast for coming soon features
    function showToast(message, type) {
        if (window.showToast) {
            window.showToast(message, type);
        } else {
            alert(message);
        }
    }
    
    // Highlight active menu item based on current URL
    document.addEventListener('DOMContentLoaded', function() {
        const currentUrl = window.location.pathname;
        
        // Remove active class from all nav-items and nav-subitems
        document.querySelectorAll('.nav-item, .nav-subitem').forEach(item => {
            item.classList.remove('active');
        });
        
        // Check for exact matches
        if (currentUrl === '/agribusiness/' || currentUrl === '/agribusiness/dashboard/') {
            const dashboardLink = document.querySelector('.nav-item[href*="agribusiness_dashboard"]');
            if (dashboardLink) dashboardLink.classList.add('active');
        }
        
        if (currentUrl === '/agribusiness/products/') {
            const productsLink = document.querySelector('.nav-item[href*="agribusiness_products"]');
            if (productsLink) productsLink.classList.add('active');
            // Also highlight the submenu parent
            const parentMenu = document.getElementById('productsMenu');
            if (parentMenu) parentMenu.classList.remove('hidden');
        }
        
        if (currentUrl === '/agribusiness/inventory/') {
            const inventoryLink = document.querySelector('.nav-subitem[href*="agribusiness_inventory"]');
            if (inventoryLink) inventoryLink.classList.add('active');
            // Expand parent menu
            const parentMenu = document.getElementById('productsMenu');
            if (parentMenu) parentMenu.classList.remove('hidden');
        }
        
        if (currentUrl === '/agribusiness/price-list/') {
            const priceListLink = document.querySelector('.nav-subitem[href*="agribusiness_price_list"]');
            if (priceListLink) priceListLink.classList.add('active');
            // Expand parent menu
            const parentMenu = document.getElementById('productsMenu');
            if (parentMenu) parentMenu.classList.remove('hidden');
        }
        
        if (currentUrl === '/agribusiness/orders/') {
            const ordersLink = document.querySelector('.nav-item[href*="agribusiness_orders"]');
            if (ordersLink) ordersLink.classList.add('active');
        }
        
        if (currentUrl === '/profile/') {
            const profileLink = document.querySelector('.nav-subitem[href*="profile"]');
            if (profileLink) profileLink.classList.add('active');
            // Expand settings menu
            const parentMenu = document.getElementById('settingsMenu');
            if (parentMenu) parentMenu.classList.remove('hidden');
        }
    });
</script>
