<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 30" width="120" height="30">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Minimalist K letter mark -->
  <g transform="translate(0, 2)">
    <path d="M5 20 L5 4" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M5 12 L12 20" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M5 12 L12 4" stroke="url(#primaryGradient)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Dot accent -->
  <circle cx="18" cy="14" r="2" fill="url(#primaryGradient)"/>
  
  <!-- Text -->
  <text x="26" y="19" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="url(#primaryGradient)" letter-spacing="2">KUKUNET</text>
</svg>