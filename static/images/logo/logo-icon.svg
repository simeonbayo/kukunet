<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8F00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (optional, can be removed for transparent) -->
  <circle cx="20" cy="20" r="19" fill="url(#primaryGradient)" opacity="0.08"/>
  
  <!-- Chicken silhouette -->
  <g transform="translate(4, 4)">
    <!-- Body -->
    <ellipse cx="12" cy="14" rx="8" ry="6" fill="url(#primaryGradient)"/>
    <!-- Head -->
    <circle cx="19" cy="9" r="4.5" fill="url(#primaryGradient)"/>
    <!-- Eye -->
    <circle cx="20.5" cy="8" r="1" fill="white"/>
    <circle cx="20.8" cy="8" r="0.5" fill="#1a1a1a"/>
    <!-- Beak -->
    <polygon points="23.5,9 26,10 23.5,11" fill="url(#secondaryGradient)"/>
    <!-- Comb -->
    <path d="M17 5 Q18 2 19 5 Q20 3 21 5 Q22 3 23 5" fill="url(#secondaryGradient)"/>
    <!-- Wing -->
    <path d="M10 13 Q7 11 6 14 Q4 16 7 17 Q9 18 10 16" fill="url(#primaryGradient)" opacity="0.6"/>
    <!-- Tail -->
    <path d="M4 11 Q1 7 3 4" stroke="url(#primaryGradient)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M5 13 Q2 10 4 6" stroke="url(#primaryGradient)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="10" y1="20" x2="9" y2="24" stroke="url(#secondaryGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="11" y2="24" stroke="url(#secondaryGradient)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>